    <!--전체-->
    <script src="{{ url_for('.static', filename='js/sjva_ui14.js') }}"></script>

    <script type="text/javascript">
        const package_name = "{{arg['package_name'] }}";
        const sub = "{{arg['sub'] }}";
        const linkkf_url = "{{arg['linkkf_url']}}";
        var current_data = null;
        const remotePrefetchState = {};

        const params = new Proxy(new URLSearchParams(window.location.search), {
            get: (searchParams, prop) => searchParams.get(prop),
        })

        const loader = document.getElementById("preloader");
        let loadingTicket = 0;
        let loadingStartedAt = 0;

        function beginPageLoading() {
            loadingTicket += 1;
            loadingStartedAt = Date.now();
            $('.demo').css("display", "block");
            loader.classList.add('is-visible');
            return loadingTicket;
        }

        function endPageLoading(ticket, minDuration = 220) {
            const elapsed = Date.now() - loadingStartedAt;
            const delay = Math.max(0, minDuration - elapsed);
            setTimeout(() => {
                if (ticket !== loadingTicket) return;
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        loader.classList.remove('is-visible');
                        $('.demo').css("display", "none");
                    });
                });
            }, delay);
        }

        const initialLoadTicket = beginPageLoading();


        function findGetParameter(parameterName) {
            let result = null,
                tmp = [];
            const items = location.search.substr(1).split("&");
            for (let index = 0; index < items.length; index++) {
                tmp = items[index].split("=");
                if (tmp[0] === parameterName) result = decodeURIComponent(tmp[1]);
            }
            return result;
        }

        function resolveLinkkfTargetUrl(rawValue) {
            const baseUrl = (linkkf_url && linkkf_url.trim()) ? linkkf_url.trim().replace(/\/$/, '') : 'https://linkkf.live';
            const raw = (rawValue || '').trim();

            if (!raw) {
                return baseUrl;
            }

            if (/^https?:\/\//i.test(raw)) {
                return raw;
            }

            return baseUrl + '/' + raw.replace(/^\/+|\/+$/g, '') + '/';
        }

        function updateGoButtonHref(rawValue) {
            $('#go_linkkf_btn').attr('data-href', resolveLinkkfTargetUrl(rawValue));
        }

        function escapeJsInlineString(value) {
            if (value === undefined || value === null) return '';
            return String(value)
                .replace(/\\/g, '\\\\')
                .replace(/'/g, "\\'")
                .replace(/\r/g, '\\r')
                .replace(/\n/g, '\\n');
        }

        function analyze(wr_id, bo_table) {
            const currentTicket = beginPageLoading();
            const code = document.getElementById("code").value
            $.ajax({
                url: '/' + package_name + '/ajax/' + sub + '/analysis',
                type: "POST",
                cache: false,
                data: {code: code, wr_id: wr_id, bo_table: bo_table},
                dataType: "json",
                success: function (ret) {
                    if (ret.ret === 'success' && ret.data != null) {
                        make_program(ret.data)
                    } else {
                        $.notify('<strong>분석 실패</strong><br>' + ret.log, {type: 'warning'});
                    }
                },
                complete: function () {
                    endPageLoading(currentTicket);
                }
            });
        }

        function make_program(data) {
            current_data = data;
            updateGoButtonHref(data.code || $('#code').val() || params.code || "{{arg['linkkf_current_code']}}");
            
            let str = "";
            
            // 1. Info Card (Top)
            str += `<div class='card p-4 mb-4 border-light request-hero-card'>`;
            str += `<div class="row request-main-grid">`;
            
            // Poster
            str += `<div class="col-md-3 text-center mb-3 mb-md-0 request-poster-col">`;
            if (data.poster_url) {
                str += `<img src="${data.poster_url}" class="img-fluid rounded shadow-lg" style="max-height: 350px; width: auto;">`;
            }
            str += `</div>`;
            
            // Details
            str += `<div class="col-md-9 request-info-col">`;
            str += `<h2 class="font-weight-bold text-white mb-2 request-title">${data.title}</h2>`;
            str += `<div class="mb-4 request-season-wrap">`;
            str += `<span class="badge badge-primary mr-2 request-season-badge">Season ${data.season}</span>`;
            str += `</div>`;
            
            // Table for details
            str += `<div class="row mb-4 request-meta-grid" style="font-size: 0.95em; color: #ccc;">`;
            if(data.detail) {
                 for(let i in data.detail) {
                     const key = Object.keys(data.detail[i])[0];
                     const value = data.detail[i][key];
                     str += `<div class="col-md-6 mb-2 request-meta-item"><span class="font-weight-bold text-info mr-2 request-meta-label">${key}:</span> <span class="text-light request-meta-value">${value}</span></div>`;
                 }
            }
            str += `</div>`; // End detail row

            str += `</div>`; // End Col-9
            str += `</div>`; // End Row
            
            // Actions Toolbar
            str += `<div class="request-toolbar request-toolbar-main">`;
            
            // Standard Actions
            if (data.first_exist_filepath) {
                const escapedFilePath = escapeJsInlineString(data.first_exist_filepath);
                const escapedFileName = escapeJsInlineString(data.first_exist_filename);
                str += `<button class="btn btn-success btn-sm request-action-btn request-action-play" data-short-label="재생" onclick="play_video('${escapedFilePath}', '${escapedFileName}')"><i class="fa fa-play"></i><span>재생</span></button>`;
            }
            str += `<button id="check_download_btn" class="btn btn-primary btn-sm request-action-btn request-action-primary" data-short-label="선택DL"><i class="fa fa-download"></i><span>선택 다운로드</span></button>`;
            str += `<button id="all_check_on_btn" class="btn btn-outline-light btn-sm request-action-btn request-action-secondary" data-short-label="전체"><span>전체 선택</span></button>`;
            str += `<button id="all_check_off_btn" class="btn btn-outline-secondary btn-sm request-action-btn request-action-muted" data-short-label="해제"><span>해제</span></button>`;
            str += `<button id="down_subtitle_btn" class="btn btn-outline-warning btn-sm request-action-btn request-action-subtitle" data-short-label="자막"><span>자막만 다운로드</span></button>`;
            
            // Scheduling (Heart)
            str += `<button id="add_whitelist" class="btn btn-outline-danger btn-sm request-action-btn request-action-danger" data-short-label="스케쥴"><i class="bi bi-heart"></i><span>스케쥴링 추가</span></button>`;
            
            str += `</div>`; // End Action Toolbar Main
            
            // Edit Tools (Secondary Toolbar)
             str += `<div class="request-toolbar request-toolbar-secondary">`;
            str += `<span class="text-muted small request-toolbar-label">저장 옵션</span>`;
            str += `<div class="request-inline-field request-inline-title">`;
            str += `<input id="new_title" class="form-control form-control-sm request-inline-input" value="${data.title}">`;
            str += `<button id="apply_new_title_btn" class="btn btn-dark btn-sm request-inline-btn">폴더명 변경</button>`;
            str += `</div>`;
            str += `<div class="request-inline-field request-inline-season">`;
            str += `<input id="new_season" class="form-control form-control-sm request-inline-input request-inline-input-small" value="${data.season}">`;
            str += `<button id="apply_new_season_btn" class="btn btn-dark btn-sm request-inline-btn">시즌 변경</button>`;
            str += `</div>`;
            // str += `<button id="search_tvdb_btn" class="btn btn-dark btn-sm request-inline-btn request-inline-btn-tvdb">TVDB 확인</button>`;
            str += `</div>`;
            
            str += `</div>`; // End Card
            
            // 2. Episode List
            str += '<div class="episode-list-container">';
            for (let i in data.episode) {
                str += '<div class="episode-card">';
                str += '<div class="episode-thumb">';
                str += '<span class="episode-num">' + data.episode[i].ep_num + '화</span>';
                str += '</div>';
                str += '<div class="episode-info">';
                str += '<div class="episode-texts">';
                str += '<div class="episode-title">' + data.episode[i].title + '</div>';
                str += '<div class="episode-filename" title="' + data.episode[i].filename + '">' + data.episode[i].filename + '</div>';
                str += '</div>';
                str += '<div class="episode-actions">';
                str += '<input id="checkbox_' + i + '" name="checkbox_' + i + '" type="checkbox" checked data-toggle="toggle" data-on="선택" data-off="-" data-onstyle="success" data-offstyle="secondary" data-size="small">';
                str += m_button("add_queue_btn", "다운로드", [{key: "idx", value: i}]);
                str += '<button class="btn btn-outline-info btn-remote-play" data-idx="' + i + '"><i class="fa fa-play-circle"></i> 보기</button>';
                str += '</div>';
                str += '</div>';
                str += '</div>';
            }
            str += '</div>';
            
            document.getElementById("episode_list").innerHTML = str;
            $('input[id^="checkbox_"]').bootstrapToggle();

            // 첫 에피소드 원본 스트림 prewarm (보기 버튼 체감 개선)
            if (data && Array.isArray(data.episode) && data.episode.length > 0) {
                prewarm_remote_stream(data.episode[0]);
            }
        }

        $(function () {
            // URL 파라미터 처리 (code)
            const urlCode = params.code || findGetParameter('code');
            const currentCode = "{{arg['linkkf_current_code']}}";
            
            const targetCode = urlCode || currentCode;
            updateGoButtonHref(targetCode);
            
            if (targetCode) {
                document.getElementById("code").value = targetCode;
                // wr_id, bo_table 등이 있으면 같이 전달
                analyze(params.wr_id || findGetParameter('wr_id'), params.bo_table || findGetParameter('bo_table'));
            } else {
                endPageLoading(initialLoadTicket);
            }
        });

        $(document).ready(function () {
            $("#main_container").removeClass("container").addClass("container-fluid");
        });

        // Enter 키로 검색 트리거
        $("#code").on('keypress', function (e) {
            if (e.which === 13) { // Enter key
                e.preventDefault();
                $("#analysis_btn").click();
            }
        });

        $("#analysis_btn").unbind("click").bind('click', function (e) {
            e.preventDefault();
            e.stopPropagation()
            const currentTicket = beginPageLoading();
            const code = document.getElementById("code").value
            updateGoButtonHref(code);
            $.ajax({
                url: '/' + package_name + '/ajax/' + sub + '/analysis',
                type: "POST",
                cache: false,
                data: {code: code},
                dataType: "json",
                success: function (ret) {
                    if (ret.ret === 'success' && ret.data != null) {
                        make_program(ret.data)
                    } else {
                        $.notify('<strong>분석 실패</strong><br>' + ret.log, {type: 'warning'});
                    }
                },
                complete: function () {
                    endPageLoading(currentTicket);
                }
            });
        });


        $("body").on('click', '#add_whitelist', function (e) {
            e.preventDefault();
            const code = document.getElementById("code").value || params.code;
            const $btn = $(this);
            $.ajax({
                url: '/' + package_name + '/ajax/' + sub + '/add_whitelist',
                type: "POST",
                cache: false,
                data: JSON.stringify({data_code: code}),
                contentType: "application/json;charset=UTF-8",
                dataType: "json",
                success: function (ret) {
                    if (ret.ret) {
                        $.notify('<strong>스케쥴링 목록에 추가하였습니다.</strong>', {type: 'success'});
                        $btn.html('<i class="bi bi-heart-fill"></i> 추가됨').removeClass('btn-outline-danger').addClass('btn-danger');
                    } else {
                         if (ret.log == "이미 추가되어 있습니다.") {
                            $.notify('<strong>이미 추가되어 있습니다.</strong>', {type: 'warning'});
                            $btn.html('<i class="bi bi-heart-fill"></i> 추가됨').removeClass('btn-outline-danger').addClass('btn-danger');
                        } else {
                            $.notify('<strong>추가 실패</strong><br>' + ret.log, {type: 'warning'});
                        }
                    }
                }
            });
        });

        $("body").on('click', '#go_linkkf_btn', function (e) {
            e.preventDefault();
            window.open($(this).attr('data-href') || resolveLinkkfTargetUrl($('#code').val() || params.code), "_blank", "noopener,noreferrer");
        });

        $("body").on('click', '#all_check_on_btn', function (e) {
            e.preventDefault();
            $('input[id^="checkbox_"]').bootstrapToggle('on')
        });

        $("body").on('click', '#all_check_off_btn', function (e) {
            e.preventDefault();
            $('input[id^="checkbox_"]').bootstrapToggle('off')
        });

        $("body").on('click', '#add_queue_btn', function (e) {
            e.preventDefault();
            let episode_data = current_data.episode[$(this).data('idx')];
            // console.log('episode_data:::>', episode_data)
            $.ajax({
                url: '/' + package_name + '/ajax/' + sub + '/add_queue',
                type: "POST",
                cache: false,
                data: {data: JSON.stringify(episode_data)},
                dataType: "json",
                success: function (ret) {
                    // console.log('#add_queue_btn::ret >>', ret)
                    if (ret.ret == 'enqueue_db_append' || ret.ret == 'enqueue_db_exist' || ret.ret == 'enqueue_gdm_success') {
                        $.notify('<strong>다운로드 작업을 추가 하였습니다.</strong>', {type: 'success'});
                    } else if (ret.ret == 'queue_exist') {
                        $.notify('<strong>이미 큐에 있습니다. 삭제 후 추가하세요.</strong>', {type: 'warning'});
                    } else if (ret.ret == 'db_completed') {
                        $.notify('<strong>DB에 완료 기록이 있습니다.</strong>', {type: 'warning'});
                    } else if (ret.ret == 'file_exists') {
                        $.notify('<strong>파일이 이미 존재합니다.</strong>', {type: 'warning'});
                    } else if (ret.ret == 'extract_failed') {
                        $.notify('<strong>추가 실패: 영상 주소 추출에 실패하였습니다.</strong>', {type: 'warning'});
                    } else {
                        const msg = ret.log || '알 수 없는 이유로 추가에 실패하였습니다.';
                        $.notify('<strong>추가 실패</strong><br>' + msg, {type: 'warning'});
                    }
                }
            });

        });

        $("body").on('click', '.btn-remote-play', function (e) {
            e.preventDefault();
            const idx = parseInt($(this).data('idx'), 10);
            if (!current_data || !current_data.episode || Number.isNaN(idx) || !current_data.episode[idx]) {
                $.notify('<strong>에피소드 정보를 찾을 수 없습니다.</strong>', {type: 'warning'});
                return;
            }
            play_remote_video(current_data.episode[idx], $(this));
        });

        $("body").on('click', '#check_download_btn', function (e) {
            e.preventDefault();
            let selected_data = [];
            $('input[id^="checkbox_"]').each(function() {
                if ($(this).prop('checked')) {
                    let idx = parseInt($(this).attr('id').split('_')[1]);
                    selected_data.push(current_data.episode[idx]);
                }
            });
            if (selected_data.length == 0) {
                $.notify('<strong>선택하세요.</strong>', {type: 'warning'});
                return;
            }
            $.ajax({
                url: '/' + package_name + '/ajax/' + sub + '/add_queue_checked_list',
                type: "POST",
                cache: false,
                data: {data: JSON.stringify(selected_data)},
                dataType: "json",
                success: function (ret) {
                    $.notify('<strong>백그라운드로 작업을 추가합니다.</strong>', {type: 'success'});
                }
            });
        });

        $("body").on('click', '#down_subtitle_btn', function (e) {
            e.preventDefault();
            let selected_data = [];
            $('input[id^="checkbox_"]').each(function() {
                if ($(this).prop('checked')) {
                    let idx = parseInt($(this).attr('id').split('_')[1]);
                    selected_data.push(current_data.episode[idx]);
                }
            });
            if (selected_data.length == 0) {
                $.notify('<strong>선택하세요.</strong>', {type: 'warning'});
                return;
            }
            $.ajax({
                url: '/' + package_name + '/ajax/' + sub + '/add_sub_queue_checked_list',
                type: "POST",
                cache: false,
                data: {data: JSON.stringify(selected_data)},
                dataType: "json",
                success: function (ret) {
                    if (ret.ret == "success") {
                        $.notify('<strong>백그라운드로 자막 다운로드를 시작합니다.</strong>', {type: 'success'});
                    } else {
                        const msg = ret.log || '알 수 없는 이유로 요청에 실패하였습니다.';
                        $.notify('<strong>자막 다운로드 요청 실패: ' + msg + '</strong>', {type: 'warning'});
                    }
                }
            });
        });
    </script>
    <style>

            font-weight: 700;
            color: #ecfdf5;

            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-input-wrapper {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .custom-input {
            background-color: rgba(2, 44, 34, 0.6) !important;
            border: 1px solid rgba(16, 185, 129, 0.3) !important;

        }

        .btn-search:hover {

            box-shadow: 0 6px 16px rgba(16, 185, 129, 0.4);
        }

        .btn-reset {
            background: rgba(255, 255, 255, 0.05);
            color: #6ee7b7;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .btn-reset:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .search-desc {
            margin-top: 12px;
            font-size: 13px;
            color: #6ee7b7;
            opacity: 0.7;
        }

        button.code-button {
            min-width: 82px !important;
        }

        .tooltip {

        .demo {
            width: 100px;
            height: 102px;
            border-radius: 100%;
            position: absolute;
            top: 45%;
            left: calc(50% - 50px);
        }

        .circle {
            width: 100%;
            height: 100%;
            position: absolute;
        }

        .circle .inner {
            width: 100%;
            height: 100%;
            border-radius: 100%;
            border: 5px solid rgba(0, 255, 170, 0.7);
            border-right: none;
            border-top: none;
            background-clip: padding;
            box-shadow: inset 0px 0px 10px rgba(0, 255, 170, 0.15);
        }

        @-webkit-keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        .circle:nth-of-type(0) {
            transform: rotate(0deg);
        }

        .circle:nth-of-type(0) .inner {
            -webkit-animation: spin 2s infinite linear;
            animation: spin 2s infinite linear;
        }

        .circle:nth-of-type(1) {
            transform: rotate(70deg);
        }

        .circle:nth-of-type(1) .inner {
            -webkit-animation: spin 2s infinite linear;
            animation: spin 2s infinite linear;
        }

        .circle:nth-of-type(2) {
            transform: rotate(140deg);

<script>
function play_video(path, filename) {
    if (!path) {
        $.notify('파일 경로를 찾을 수 없습니다.', { type: 'warning' });
        return;
    }
    if (typeof VideoModal === 'undefined' || !VideoModal.openWithPath) {
        $.notify('비디오 모달 초기화 실패', { type: 'warning' });
        return;
    }
    VideoModal.openWithPath(path);
}

function prewarm_remote_stream(episodeData) {
    if (!episodeData || !episodeData.url) return;
    if (remotePrefetchState[episodeData.url]) return;
    remotePrefetchState[episodeData.url] = 'pending';

    $.ajax({
        url: '/' + package_name + '/ajax/' + sub + '/prefetch_remote_stream',
        type: 'POST',
        cache: false,
        data: { playid_url: episodeData.url },
        dataType: 'json',
        success: function(ret) {
            remotePrefetchState[episodeData.url] = (ret && ret.ret === 'success') ? 'ready' : 'miss';
        },
        error: function() {
            remotePrefetchState[episodeData.url] = 'miss';
        }
    });
}

function play_remote_video(episodeData, triggerBtn) {
    if (!episodeData || !episodeData.url) {
        $.notify('원본 재생 URL이 없습니다.', { type: 'warning' });
        return;
    }
    if (triggerBtn && triggerBtn.length) {
        triggerBtn.prop('disabled', true).html('<i class="fa fa-spinner fa-spin"></i> 준비중');
    }

    $.ajax({
        url: '/' + package_name + '/ajax/' + sub + '/resolve_remote_stream',
        type: 'POST',
        cache: false,
        data: { playid_url: episodeData.url },
        dataType: 'json',
        success: function(ret) {
            if (!ret || ret.ret !== 'success' || !ret.stream_url) {
                var msg = (ret && ret.log) ? ret.log : '원본 영상 주소를 가져오지 못했습니다.';
                $.notify('<strong>재생 실패</strong><br>' + msg, { type: 'warning' });
                return;
            }

            var proxyBase = '/' + package_name + '/ajax/' + sub + '/proxy_remote_media';
            var proxyReferer = ret.referer_url || episodeData.url || 'https://linkkf.live/';
            var proxiedStreamUrl = proxyBase + '?url=' + encodeURIComponent(ret.stream_url) + '&referer=' + encodeURIComponent(proxyReferer);
            var proxiedSubtitleUrl = '';
            if (ret.subtitle_url) {
                proxiedSubtitleUrl = proxyBase + '?url=' + encodeURIComponent(ret.subtitle_url) + '&referer=' + encodeURIComponent(proxyReferer);
            }

            if (typeof VideoModal === 'undefined' || !VideoModal.openWithUrl) {
                $.notify('비디오 모달 초기화 실패', { type: 'warning' });
                return;
            }
            VideoModal.openWithUrl(
                proxiedStreamUrl,
                episodeData.title || episodeData.filename || '원본 재생',
                {
                    source_type: 'application/x-mpegURL',
                    subtitle_url: proxiedSubtitleUrl,
                    is_remote: true
                }
            );

            if (ret.subtitle_url) {
                $.notify('<strong>원본 재생 시작 (자막 포함)</strong>', { type: 'success' });
            } else {
                $.notify('<strong>원본 재생 시작 (자막 없음)</strong>', { type: 'info' });
            }
        },
        error: function(xhr) {
            var msg = (xhr && xhr.responseJSON && xhr.responseJSON.log) ? xhr.responseJSON.log : '네트워크 오류';
            $.notify('<strong>재생 실패</strong><br>' + msg, { type: 'warning' });
        },
        complete: function() {
            if (triggerBtn && triggerBtn.length) {
                triggerBtn.prop('disabled', false).html('<i class="fa fa-play-circle"></i> 보기');
            }
        }
    });
}
</script>
